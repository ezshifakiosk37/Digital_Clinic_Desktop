name: Build Desktop Apps
on:
  push:
    branches: [ main ] 

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # Removed macos-latest to save time and storage
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Run Next.js Build
        run: npm run build

      - name: Electron Forge Make
        # Note: Building both x64 and arm64 doubles your storage usage.
        # If your clinic kiosks are standard PCs, you only need x64.
        run: npx electron-forge make --arch x64

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.os }}
          # Logic: Only upload relevant files for the current OS
          path: |
            out/make/**/*.deb
            out/make/**/*.rpm
            out/make/**/*.exe
          # CRITICAL: This fixes your "Storage Quota Hit" error.
          # It deletes the file from GitHub after 1 day,.
          retention-days: 1
          if-no-files-found: error